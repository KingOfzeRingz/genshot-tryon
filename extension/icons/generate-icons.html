<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save image as..." to create the icon files.</p>
<div>
  <p>icon16.png:</p><canvas id="c16" width="16" height="16"></canvas>
  <p>icon48.png:</p><canvas id="c48" width="48" height="48"></canvas>
  <p>icon128.png:</p><canvas id="c128" width="128" height="128"></canvas>
</div>
<script>
function drawIcon(canvasId, size) {
  var c = document.getElementById(canvasId);
  var ctx = c.getContext('2d');
  var r = size * 0.2;
  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#6C5CE7';
  ctx.fill();
  // Letter G
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold ' + (size * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('G', size/2, size/2 + size*0.03);
}
drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);

// Auto-download
['c16','c48','c128'].forEach(function(id) {
  var c = document.getElementById(id);
  var link = document.createElement('a');
  link.download = 'icon' + c.width + '.png';
  link.href = c.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
