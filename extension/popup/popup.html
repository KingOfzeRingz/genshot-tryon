<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenShot TryOn</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="#6C5CE7"/>
          <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11L12 9H15.5C16.33 9 17 9.67 17 10.5V15.5C17 16.33 16.33 17 15.5 17H8.5C7.67 17 7 16.33 7 15.5V8.5Z" fill="white"/>
          <circle cx="12" cy="13" r="2" fill="#6C5CE7"/>
        </svg>
        <span class="logo-text">GenShot TryOn</span>
      </div>
    </header>

    <!-- Loading State -->
    <section id="state-loading" class="state">
      <div class="loading-container">
        <div class="spinner"></div>
        <p class="loading-text">Analyzing product...</p>
      </div>
    </section>

    <!-- No Product Found State -->
    <section id="state-no-product" class="state hidden">
      <div class="empty-state">
        <svg class="empty-icon" width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="4 4"/>
          <path d="M18 20L24 26L30 20" stroke="#CBD5E0" stroke-width="2" stroke-linecap="round"/>
          <path d="M24 26V34" stroke="#CBD5E0" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p class="empty-title">No product detected</p>
        <p class="empty-text">Navigate to a product page on a supported store (Zara, H&amp;M) to get started.</p>
      </div>
    </section>

    <!-- Product Found State -->
    <section id="state-product" class="state hidden">
      <div class="product-card">
        <div class="product-image-container">
          <img id="product-image" class="product-image" src="" alt="Product image">
        </div>
        <div class="product-info">
          <span id="product-brand" class="product-brand"></span>
          <h2 id="product-name" class="product-name"></h2>
          <div class="product-meta">
            <span id="product-price" class="product-price"></span>
            <span id="product-color" class="product-color"></span>
          </div>
          <div id="product-sizes" class="product-sizes"></div>
        </div>
      </div>

      <button id="btn-import" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3V12M9 12L5 8M9 12L13 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 15H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Import to GenShot
      </button>
    </section>

    <!-- Importing State -->
    <section id="state-importing" class="state hidden">
      <div class="loading-container">
        <div class="spinner"></div>
        <p class="loading-text">Creating import session...</p>
      </div>
    </section>

    <!-- QR Code State -->
    <section id="state-qr" class="state hidden">
      <div class="qr-container">
        <div class="qr-success-badge">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="8" fill="#00D2D3"/>
            <path d="M5 8L7 10L11 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Ready to import</span>
        </div>
        <canvas id="qr-canvas" class="qr-canvas"></canvas>
        <p class="qr-instruction">Scan this QR code with the<br><strong>GenShot app</strong> to import the item</p>
      </div>
    </section>

    <!-- Error State -->
    <section id="state-error" class="state hidden">
      <div class="error-container">
        <svg class="error-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="#E53E3E" stroke-width="2"/>
          <path d="M20 12V22" stroke="#E53E3E" stroke-width="2" stroke-linecap="round"/>
          <circle cx="20" cy="27" r="1.5" fill="#E53E3E"/>
        </svg>
        <p id="error-message" class="error-message">Something went wrong</p>
        <button id="btn-retry" class="btn-secondary">Try Again</button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-text">GenShot TryOn v1.0.0</span>
    </footer>
  </div>

  <script src="../lib/qrcode.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
